<div class="min-h-screen bg-slate-50">
  <header class="sticky top-0 z-20 border-b border-white/60 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-4 sm:px-5">
      <div>
        <p class="text-xs font-semibold uppercase tracking-[0.3em] text-sky-500">{{ eyebrow() }}</p>
        <h1 class="text-xl font-bold text-slate-950">{{ title() }}</h1>
      </div>

      <p-button label="Logout" icon="pi pi-sign-out" severity="secondary" [outlined]="true" (onClick)="logout.emit()" />
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-5 sm:px-5 sm:py-8">
    <ng-content />
  </main>
</div>
